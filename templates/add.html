<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Recipe - Recipinator</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: #f5f0eb;
            color: #333;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header {
            background: #2c3e50;
            color: white;
            padding: 1rem 2rem;
            width: 100%;
            text-align: center;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.15);
        }

        header a {
            color: white;
            text-decoration: none;
            font-size: 1.6rem;
            font-weight: 700;
            letter-spacing: 0.5px;
        }

        .card {
            background: white;
            border-radius: 12px;
            box-shadow: 0 3px 12px rgba(0, 0, 0, 0.12);
            padding: 2rem;
            margin: 2rem 1rem;
            width: 100%;
            max-width: 500px;
            text-align: center;
        }

        .card h2 {
            color: #2c3e50;
            margin-bottom: 1rem;
            font-size: 1.3rem;
        }

        .url-display {
            background: #f5f0eb;
            border-radius: 6px;
            padding: 0.6rem 1rem;
            font-size: 0.85rem;
            color: #666;
            word-break: break-all;
            margin-bottom: 1.5rem;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #eee;
            border-top: 4px solid #e67e22;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 1rem auto;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .status-text {
            color: #666;
            margin-top: 0.5rem;
        }

        .success-icon {
            font-size: 3rem;
            margin-bottom: 0.5rem;
        }

        .error-text {
            color: #c0392b;
            margin: 1rem 0;
            line-height: 1.4;
        }

        .recipe-title {
            font-size: 1.1rem;
            font-weight: 600;
            color: #2c3e50;
            margin: 0.5rem 0 1rem;
        }

        .btn {
            display: inline-block;
            padding: 0.6rem 1.5rem;
            border: none;
            border-radius: 6px;
            font-size: 0.95rem;
            cursor: pointer;
            font-weight: 500;
            text-decoration: none;
            transition: background 0.2s;
            margin: 0.3rem;
        }

        .btn-primary { background: #e67e22; color: white; }
        .btn-primary:hover { background: #d35400; }
        .btn-secondary { background: #7f8c8d; color: white; }
        .btn-secondary:hover { background: #6c7a7b; }

        /* Manual input form */
        .manual-form { text-align: left; }

        .manual-form label {
            display: block;
            font-weight: 600;
            margin-bottom: 0.5rem;
            color: #555;
        }

        .manual-form input[type="url"] {
            width: 100%;
            padding: 0.7rem 1rem;
            border: 2px solid #ddd;
            border-radius: 6px;
            font-size: 1rem;
            margin-bottom: 1rem;
        }

        .manual-form input[type="url"]:focus {
            outline: none;
            border-color: #e67e22;
        }

        .hidden { display: none; }
    </style>
</head>
<body>
    <header>
        <a href="/">Recipinator</a>
    </header>

    <!-- Loading state -->
    <div id="state-loading" class="card hidden">
        <h2>Adding Recipe</h2>
        <div class="url-display" id="loading-url"></div>
        <div class="spinner"></div>
        <p class="status-text">Scraping recipe...</p>
    </div>

    <!-- Success state -->
    <div id="state-success" class="card hidden">
        <div class="success-icon">&#10003;</div>
        <h2>Recipe Added!</h2>
        <p class="recipe-title" id="success-title"></p>
        <a href="/" class="btn btn-primary">View in Recipinator</a>
    </div>

    <!-- Error state -->
    <div id="state-error" class="card hidden">
        <h2>Something went wrong</h2>
        <p class="error-text" id="error-message"></p>
        <button class="btn btn-primary" onclick="retryOrGoHome()">Try Again</button>
        <a href="/" class="btn btn-secondary">Back to Recipinator</a>
    </div>

    <!-- Manual input (no ?url= param) -->
    <div id="state-manual" class="card hidden">
        <h2>Add a Recipe</h2>
        <div class="manual-form">
            <label for="manual-url">Recipe URL</label>
            <input type="url" id="manual-url" placeholder="https://example.com/recipe">
            <div id="manual-error" class="error-text hidden"></div>
            <button class="btn btn-primary" onclick="submitManual()" id="btn-manual-submit" style="width:100%;">Add Recipe</button>
        </div>
    </div>

    <script>
        const stateLoading = document.getElementById('state-loading');
        const stateSuccess = document.getElementById('state-success');
        const stateError = document.getElementById('state-error');
        const stateManual = document.getElementById('state-manual');

        const params = new URLSearchParams(window.location.search);
        const recipeUrl = params.get('url');

        if (recipeUrl) {
            addRecipe(recipeUrl);
        } else {
            stateManual.classList.remove('hidden');
            document.getElementById('manual-url').focus();
            document.getElementById('manual-url').addEventListener('keydown', function(e) {
                if (e.key === 'Enter') submitManual();
            });
        }

        async function addRecipe(url) {
            showState('loading');
            document.getElementById('loading-url').textContent = url;

            try {
                const res = await fetch('/api/recipes', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ url: url }),
                });

                const data = await res.json();

                if (!res.ok) {
                    throw new Error(data.error || 'Failed to add recipe');
                }

                showState('success');
                document.getElementById('success-title').textContent = data.title;
            } catch (err) {
                showState('error');
                document.getElementById('error-message').textContent = err.message;
            }
        }

        function submitManual() {
            const input = document.getElementById('manual-url');
            const errorDiv = document.getElementById('manual-error');
            const url = input.value.trim();

            if (!url) {
                errorDiv.textContent = 'Please enter a URL.';
                errorDiv.classList.remove('hidden');
                return;
            }

            errorDiv.classList.add('hidden');
            addRecipe(url);
        }

        function showState(state) {
            stateLoading.classList.add('hidden');
            stateSuccess.classList.add('hidden');
            stateError.classList.add('hidden');
            stateManual.classList.add('hidden');

            document.getElementById('state-' + state).classList.remove('hidden');
        }

        function retryOrGoHome() {
            if (recipeUrl) {
                addRecipe(recipeUrl);
            } else {
                showState('manual');
            }
        }
    </script>
</body>
</html>
