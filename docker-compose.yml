services:
  recipinator:
    build: https://github.com/skuzniak-ca/recipinator.git
    container_name: recipinator
    ports:
      - "${HOST_PORT:-5000}:5000"
    volumes:
      - CHANGE_TO_COMPOSE_DATA_PATH/recipinator/data:/app/data
      - CHANGE_TO_COMPOSE_DATA_PATH/recipinator/uploads:/app/static/uploads
    environment:
      - DB_PATH=/app/data/recipinator.db
    restart: unless-stopped
